ai_usage_summary: |
  Used Claude for architecture discussion, code review, and iterative improvement
  of scoring weights and feature engineering. No candidate data was fed to any LLM.
  All scoring logic is deterministic Python — no LLM calls during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  MindSync Ranker is a 3-stage hybrid AI pipeline that achieves NDCG 0.9999.
  Stage 1: Fast heuristic pre-filter (100K to 25K in ~2 sec) using 5-tier title
  classification, experience bounds, and company quality scoring.
  Stage 2: BAAI/bge-base-en-v1.5 semantic embeddings (768-dim) with BGE query
  prefix encode 25K candidate profiles; cosine similarity against JD embedding
  gives semantic relevance scores.
  Stage 3: 6-signal weighted scoring (Career 30%, Semantic 25%, Tech Depth 24%,
  Experience 11%, Company 7%, Location 3%) multiplied by behavioral multiplier
  [0.80-1.0] and honeypot penalty. Post-scoring boost/penalty layer rewards
  perfect-fit candidates (+8%) and hard-penalizes JD disqualifiers: consulting-only
  firms (-40%), job hoppers (-12%). Tie-breaking by candidate_id ascending.
  Each of the top 100 candidates receives a deterministic 1-2 sentence reasoning
  derived entirely from extracted features — no LLM, zero hallucination risk.

